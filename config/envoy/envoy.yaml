# Ahara observability ingest gateway.
#
# Validates a Cognito client_credentials (M2M) JWT on every external write to the
# telemetry backends, then proxies to the internal service. Backends themselves
# are NOT published to the host; only this gateway is. Internal service-to-service
# traffic keeps using the Docker network directly and is unaffected.
#
# @COGNITO_ISSUER@ / @COGNITO_JWKS_URI@ / @INGEST_SCOPE@ are substituted at
# container start from environment (see the compose `command`). All are public.

node:
  id: ahara-ingest-gateway
  cluster: ahara-observability

static_resources:
  listeners:
    # --- VictoriaMetrics (remote_write / query) ---
    - name: victoriametrics
      address: { socket_address: { address: 0.0.0.0, port_value: 8428 } }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: victoriametrics
                codec_type: AUTO
                route_config:
                  name: victoriametrics
                  virtual_hosts:
                    - name: victoriametrics
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: victoriametrics, timeout: 0s }
                http_filters:
                  - name: envoy.filters.http.jwt_authn
                    typed_config: &jwt_authn
                      "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                      providers:
                        cognito:
                          issuer: "@COGNITO_ISSUER@"
                          forward: true
                          payload_in_metadata: jwt_payload
                          remote_jwks:
                            http_uri:
                              uri: "@COGNITO_JWKS_URI@"
                              cluster: cognito_jwks
                              timeout: 5s
                            cache_duration: 600s
                      rules:
                        - match: { prefix: "/" }
                          requires: { provider_name: cognito }
                  - name: envoy.filters.http.rbac
                    typed_config: &rbac
                      "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBAC
                      rules:
                        action: ALLOW
                        policies:
                          ingest-scope:
                            permissions:
                              - any: true
                            principals:
                              - metadata:
                                  filter: envoy.filters.http.jwt_authn
                                  path:
                                    - key: jwt_payload
                                    - key: scope
                                  value:
                                    string_match:
                                      contains: "@INGEST_SCOPE@"
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # --- Loki (push / query) ---
    - name: loki
      address: { socket_address: { address: 0.0.0.0, port_value: 3100 } }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: loki
                codec_type: AUTO
                route_config:
                  name: loki
                  virtual_hosts:
                    - name: loki
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: loki, timeout: 0s }
                http_filters:
                  - name: envoy.filters.http.jwt_authn
                    typed_config: *jwt_authn
                  - name: envoy.filters.http.rbac
                    typed_config: *rbac
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # --- OTLP HTTP ---
    - name: otlp_http
      address: { socket_address: { address: 0.0.0.0, port_value: 4318 } }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: otlp_http
                codec_type: AUTO
                route_config:
                  name: otlp_http
                  virtual_hosts:
                    - name: otlp_http
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: alloy_http, timeout: 0s }
                http_filters:
                  - name: envoy.filters.http.jwt_authn
                    typed_config: *jwt_authn
                  - name: envoy.filters.http.rbac
                    typed_config: *rbac
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # --- OTLP gRPC ---
    - name: otlp_grpc
      address: { socket_address: { address: 0.0.0.0, port_value: 4317 } }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: otlp_grpc
                codec_type: HTTP2
                route_config:
                  name: otlp_grpc
                  virtual_hosts:
                    - name: otlp_grpc
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: alloy_grpc, timeout: 0s }
                http_filters:
                  - name: envoy.filters.http.jwt_authn
                    typed_config: *jwt_authn
                  - name: envoy.filters.http.rbac
                    typed_config: *rbac
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: victoriametrics
      type: STRICT_DNS
      connect_timeout: 5s
      # VictoriaMetrics binds IPv4 only; force V4 so Envoy doesn't pick the
      # container's IPv6 address (which refuses connections).
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: victoriametrics
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: victoriametrics, port_value: 8428 } } }

    - name: loki
      type: STRICT_DNS
      connect_timeout: 5s
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: loki
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: loki, port_value: 3100 } } }

    - name: alloy_http
      type: STRICT_DNS
      connect_timeout: 5s
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: alloy_http
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: alloy, port_value: 4318 } } }

    - name: alloy_grpc
      type: STRICT_DNS
      connect_timeout: 5s
      dns_lookup_family: V4_ONLY
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: alloy_grpc
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: alloy, port_value: 4317 } } }

    # Cognito JWKS endpoint (public keys) — TLS to AWS.
    - name: cognito_jwks
      type: LOGICAL_DNS
      connect_timeout: 5s
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: cognito_jwks
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: cognito-idp.us-east-1.amazonaws.com, port_value: 443 } } }
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          sni: cognito-idp.us-east-1.amazonaws.com

admin:
  address:
    socket_address: { address: 127.0.0.1, port_value: 9901 }
