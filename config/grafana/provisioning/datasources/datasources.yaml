apiVersion: 1

datasources:
  - name: VictoriaMetrics
    uid: victoriametrics
    type: prometheus
    access: proxy
    url: http://victoriametrics:8428
    isDefault: true
    jsonData:
      timeInterval: 15s
      # Tempo remote-writes exemplars; let metric points jump to the trace.
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo
        - name: traceID
          datasourceUid: tempo

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      maxLines: 1000
      # Extract a trace id out of log lines and link to the Tempo trace view.
      derivedFields:
        - name: trace_id
          matcherType: regex
          matcherRegex: '(?:trace[_-]?id|traceID)["=:\s]+([0-9a-fA-F]{16,32})'
          url: '${__value.raw}'
          datasourceUid: tempo
          urlDisplayLabel: 'View trace'

  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      serviceMap:
        datasourceUid: victoriametrics
      nodeGraph:
        enabled: true
      tracesToLogsV2:
        datasourceUid: loki
        filterBySpanID: true
        filterByTraceID: true
        tags:
          - key: service.name
            value: service_name
      tracesToMetrics:
        datasourceUid: victoriametrics
        tags:
          - key: service.name
            value: service
        queries:
          - name: 'Span call rate'
            query: 'sum(rate(traces_spanmetrics_calls_total{$$__tags}[$$__rate_interval]))'
          - name: 'Span p95 latency'
            query: 'histogram_quantile(0.95, sum(rate(traces_spanmetrics_latency_bucket{$$__tags}[$$__rate_interval])) by (le))'

  - name: InfluxDB Sensors
    uid: influxdb-sensors
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      defaultBucket: env_sensors
      organization: ahara
      version: Flux
    secureJsonData:
      token: ${INFLUXDB_ADMIN_TOKEN}

  - name: voltage-data
    uid: fewxrdtvmrk00a
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    user: admin
    jsonData:
      dbName: voltage-data
      httpMode: POST
      version: InfluxQL
    secureJsonData:
      password: ${INFLUXDB_ADMIN_TOKEN}

  - name: environment-data
    uid: aezaej38ebf9ce
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    user: admin
    jsonData:
      dbName: environment-data
      defaultBucket: environment-data
      httpMode: POST
      organization: ahara
      version: InfluxQL
    secureJsonData:
      password: ${INFLUXDB_ADMIN_TOKEN}
