global:
  scrape_interval: 30s

scrape_configs:
  - job_name: grafana
    static_configs:
      - targets:
          - grafana:3000

  - job_name: loki
    static_configs:
      - targets:
          - loki:3100

  - job_name: tempo
    static_configs:
      - targets:
          - tempo:3200

  - job_name: victoriametrics
    static_configs:
      - targets:
          - victoriametrics:8428

  - job_name: influxdb
    metrics_path: /metrics
    static_configs:
      - targets:
          - influxdb:8086

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
