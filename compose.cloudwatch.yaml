services:
  grafana:
    image: grafana/grafana:12.4.4
    container_name: ahara-grafana
    init: true
    user: "0:0"
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    ports:
      - "30038:3000"
    environment:
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-us-east-1}"
      AWS_REGION: "${AWS_DEFAULT_REGION:-us-east-1}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_SESSION_TOKEN: "${AWS_SESSION_TOKEN:-}"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_BASIC_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
      GF_AUTH_GENERIC_OAUTH_API_URL: "https://auth.services.ahara.io/oauth2/userInfo"
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "https://auth.services.ahara.io/oauth2/authorize"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "${GRAFANA_COGNITO_CLIENT_ID}"
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "${GRAFANA_COGNITO_CLIENT_SECRET}"
      GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH: "email"
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "Ahara"
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid email profile"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "https://auth.services.ahara.io/oauth2/token"
      GF_AUTH_GENERIC_OAUTH_USE_PKCE: "true"
      GF_AUTH_OAUTH_AUTO_LOGIN: "true"
      GF_AUTH_SIGNOUT_REDIRECT_URL: "https://auth.services.ahara.io/logout?client_id=${GRAFANA_COGNITO_CLIENT_ID}&logout_uri=https%3A%2F%2Fdashboards.services.ahara.io%2Flogin"
      GF_LOG_LEVEL: "info"
      GF_METRICS_ENABLED: "true"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_SECRET_KEY: "${GRAFANA_SECRET_KEY}"
      GF_SERVER_DOMAIN: "dashboards.services.ahara.io"
      GF_SERVER_ROOT_URL: "https://dashboards.services.ahara.io"
      GF_USERS_AUTO_ASSIGN_ORG: "true"
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: "Admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
      INFLUXDB_ADMIN_TOKEN: "${INFLUXDB_ADMIN_TOKEN}"
    volumes:
      - /mnt/apps/apps/ahara-observability/grafana:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
      - /mnt/apps/apps/ahara-observability/aws:/usr/share/grafana/.aws:ro
    networks:
      - observability

networks:
  observability:
    name: ahara-observability
