name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  ci:
    uses: chris-arsenault/ahara/.github/workflows/ci.yml@main
    secrets: inherit

  bootstrap:
    if: github.ref == 'refs/heads/main'
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: us-east-1

      - name: Bootstrap Grafana dashboard deployer token
        run: |
          set -euo pipefail
          REGION="us-east-1"
          PARAM="/ahara/observability/grafana-dashboard-deployer/bootstrap-function-name"

          FN=""
          for attempt in $(seq 1 40); do
            if FN=$(aws ssm get-parameter \
              --name "${PARAM}" \
              --query Parameter.Value \
              --output text \
              --region "${REGION}" 2>/tmp/grafana-bootstrap-ssm-error); then
              break
            fi

            if [ "${attempt}" -eq 40 ]; then
              echo "::error::Grafana dashboard bootstrap function parameter is unavailable: ${PARAM}"
              cat /tmp/grafana-bootstrap-ssm-error
              exit 1
            fi

            echo "Waiting for Grafana dashboard bootstrap function parameter (${attempt}/40)..."
            sleep 15
          done

          for attempt in $(seq 1 20); do
            echo "Bootstrapping Grafana dashboard deployer token (${attempt}/20)..."
            RESULT_FILE=$(mktemp)
            ERROR_FILE=$(mktemp)
            if AWS_MAX_ATTEMPTS=1 aws lambda invoke \
              --function-name "${FN}" \
              --payload '{"action":"bootstrap-dashboard-deployer-token"}' \
              --cli-binary-format raw-in-base64-out \
              --cli-read-timeout 120 \
              --region "${REGION}" \
              "${RESULT_FILE}" > /dev/null 2>"${ERROR_FILE}"; then
              RESULT=$(cat "${RESULT_FILE}")
              rm "${RESULT_FILE}" "${ERROR_FILE}"
              if echo "${RESULT}" | grep -q '"success":true'; then
                echo "Grafana dashboard deployer token created and stored in SSM"
                exit 0
              fi

              echo "Grafana dashboard deployer bootstrap is not ready yet:"
              echo "${RESULT}" | python3 -m json.tool 2>/dev/null || echo "${RESULT}"
            else
              echo "Grafana dashboard deployer bootstrap invoke failed:"
              cat "${ERROR_FILE}"
              rm "${RESULT_FILE}" "${ERROR_FILE}"
            fi

            if [ "${attempt}" -lt 20 ]; then
              sleep 15
            fi
          done

          echo "::error::Grafana dashboard deployer bootstrap failed after all retries"
          exit 1
