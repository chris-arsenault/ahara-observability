services:
  grafana:
    image: grafana/grafana:12.4.4
    container_name: ahara-grafana
    init: true
    user: "0:0"
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    ports:
      - "192.168.66.3:30038:3000"
    environment:
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-us-east-1}"
      AWS_REGION: "${AWS_DEFAULT_REGION:-us-east-1}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_SESSION_TOKEN: "${AWS_SESSION_TOKEN:-}"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_LOG_LEVEL: "info"
      GF_METRICS_ENABLED: "true"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_SECRET_KEY: "${GRAFANA_SECRET_KEY}"
      GF_SERVER_DOMAIN: "dashboards.services.ahara.io"
      GF_SERVER_ROOT_URL: "https://dashboards.services.ahara.io"
      GF_USERS_ALLOW_SIGN_UP: "false"
      INFLUXDB_ADMIN_TOKEN: "${INFLUXDB_ADMIN_TOKEN}"
    volumes:
      - /mnt/apps/apps/ahara-observability/grafana:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
      - /mnt/apps/apps/ahara-observability/aws:/usr/share/grafana/.aws:ro
    networks:
      - observability

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.146.0
    container_name: ahara-victoriametrics
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    command:
      - -storageDataPath=/storage
      - -retentionPeriod=12
      - -httpListenAddr=:8428
    ports:
      - "192.168.66.3:8428:8428"
    volumes:
      - /mnt/apps/apps/ahara-observability/victoriametrics:/storage
    networks:
      - observability

  vmagent:
    image: victoriametrics/vmagent:v1.146.0
    container_name: ahara-vmagent
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    command:
      - -promscrape.config=/etc/vmagent/prometheus.yml
      - -remoteWrite.url=http://victoriametrics:8428/api/v1/write
      - -remoteWrite.tmpDataPath=/vmagent-remotewrite-data
    depends_on:
      - victoriametrics
    volumes:
      - ./config/vmagent/prometheus.yml:/etc/vmagent/prometheus.yml:ro
      - /mnt/apps/apps/ahara-observability/vmagent:/vmagent-remotewrite-data
    networks:
      - observability

  loki:
    image: grafana/loki:3.7.3
    container_name: ahara-loki
    init: true
    user: "0:0"
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    command:
      - -config.file=/etc/loki/loki.yaml
    ports:
      - "192.168.66.3:3100:3100"
    volumes:
      - ./config/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - /mnt/apps/apps/ahara-observability/loki:/loki
    networks:
      - observability

  tempo:
    image: grafana/tempo:2.9.0
    container_name: ahara-tempo
    init: true
    user: "0:0"
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    command:
      - -config.file=/etc/tempo/tempo.yaml
    ports:
      - "192.168.66.3:4317:4317"
      - "192.168.66.3:4318:4318"
    volumes:
      - ./config/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - /mnt/apps/apps/ahara-observability/tempo:/var/tempo
    networks:
      - observability

  influxdb:
    image: influxdb:2.9.1
    container_name: ahara-influxdb
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    ports:
      - "192.168.66.3:18086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: "${INFLUXDB_ADMIN_TOKEN}"
      DOCKER_INFLUXDB_INIT_BUCKET: "env_sensors"
      DOCKER_INFLUXDB_INIT_MODE: "setup"
      DOCKER_INFLUXDB_INIT_ORG: "ahara"
      DOCKER_INFLUXDB_INIT_PASSWORD: "${INFLUXDB_ADMIN_PASSWORD}"
      DOCKER_INFLUXDB_INIT_RETENTION: "0"
      DOCKER_INFLUXDB_INIT_USERNAME: "admin"
    volumes:
      - /mnt/apps/apps/ahara-observability/influxdb:/var/lib/influxdb2
      - /mnt/apps/apps/ahara-observability/influxdb-config:/etc/influxdb2
    networks:
      - observability

  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: ahara-node-exporter
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    pid: host
    security_opt:
      - no-new-privileges:true
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|var/lib/docker/.+)($|/)
    volumes:
      - /:/host:ro,rslave
    networks:
      - observability

networks:
  observability:
    name: ahara-observability
