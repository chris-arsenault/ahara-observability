x-observability-user: &observability-user "${OBSERVABILITY_UID:-2401}:${OBSERVABILITY_GID:-2401}"

services:
  grafana:
    image: grafana/grafana:12.4.4
    container_name: ahara-grafana
    init: true
    user: *observability-user
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    ports:
      - "30038:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_BASIC_ENABLED: "true"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
      GF_AUTH_GENERIC_OAUTH_API_URL: "https://auth.services.ahara.io/oauth2/userInfo"
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "https://auth.services.ahara.io/oauth2/authorize"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "${GRAFANA_COGNITO_CLIENT_ID}"
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "${GRAFANA_COGNITO_CLIENT_SECRET}"
      GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH: "email"
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "Ahara"
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid email profile"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "https://auth.services.ahara.io/oauth2/token"
      GF_AUTH_GENERIC_OAUTH_USE_PKCE: "true"
      GF_AUTH_OAUTH_AUTO_LOGIN: "true"
      GF_AUTH_SIGNOUT_REDIRECT_URL: "https://auth.services.ahara.io/logout?client_id=${GRAFANA_COGNITO_CLIENT_ID}&logout_uri=https%3A%2F%2Fdashboards.services.ahara.io%2Flogin"
      GF_LOG_LEVEL: "info"
      GF_METRICS_ENABLED: "true"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_SECRET_KEY: "${GRAFANA_SECRET_KEY}"
      GF_SERVER_DOMAIN: "dashboards.services.ahara.io"
      GF_SERVER_ROOT_URL: "https://dashboards.services.ahara.io"
      GF_USERS_AUTO_ASSIGN_ORG: "true"
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: "Admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
      INFLUXDB_ADMIN_TOKEN: "${INFLUXDB_ADMIN_TOKEN}"
    volumes:
      - /mnt/apps/apps/ahara-observability/grafana:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - observability

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.146.0
    container_name: ahara-victoriametrics
    init: true
    user: *observability-user
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    command:
      - -storageDataPath=/storage
      - -retentionPeriod=12
      - -httpListenAddr=:8428
    # Not published to the host — external writers go through ingest-gateway
    # (JWT auth). Internal clients reach it as victoriametrics:8428.
    volumes:
      - /mnt/apps/apps/ahara-observability/victoriametrics:/storage
    networks:
      - observability

  vmagent:
    image: victoriametrics/vmagent:v1.146.0
    container_name: ahara-vmagent
    init: true
    user: *observability-user
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    command:
      - -promscrape.config=/etc/vmagent/prometheus.yml
      - -promscrape.configCheckInterval=30s
      - -remoteWrite.url=http://victoriametrics:8428/api/v1/write
      - -remoteWrite.tmpDataPath=/vmagent-remotewrite-data
    depends_on:
      - victoriametrics
    volumes:
      - ./config/vmagent/prometheus.yml:/etc/vmagent/prometheus.yml:ro
      - /mnt/apps/apps/ahara-observability/vmagent:/vmagent-remotewrite-data
    networks:
      - observability

  alloy:
    image: grafana/alloy:v1.11.3
    container_name: ahara-alloy
    init: true
    user: *observability-user
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    # OTLP (4317/4318) is not published directly — external producers go through
    # ingest-gateway (JWT auth). 12345 (UI/metrics) stays internal; vmagent
    # scrapes it as alloy:12345.
    depends_on:
      - loki
      - tempo
      - victoriametrics
    volumes:
      - ./config/alloy/local.alloy:/etc/alloy/config.alloy:ro
      - /mnt/apps/apps/ahara-observability/alloy:/var/lib/alloy
    networks:
      - observability

  ingest-gateway:
    image: envoyproxy/envoy:v1.32-latest
    container_name: ahara-ingest-gateway
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    # Renders the public Cognito issuer/JWKS/scope into the Envoy config at
    # start (Envoy has no native env substitution), then runs Envoy. Only this
    # service publishes the ingest ports; the backends stay internal.
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed -e "s#@COGNITO_ISSUER@#$${COGNITO_ISSUER}#g" \
            -e "s#@COGNITO_JWKS_URI@#$${COGNITO_JWKS_URI}#g" \
            -e "s#@INGEST_SCOPE@#$${INGEST_SCOPE}#g" \
            /etc/envoy/envoy.yaml > /tmp/envoy.yaml
        exec /usr/local/bin/envoy -c /tmp/envoy.yaml
    environment:
      COGNITO_ISSUER: "${COGNITO_ISSUER}"
      COGNITO_JWKS_URI: "${COGNITO_JWKS_URI}"
      INGEST_SCOPE: "${INGEST_SCOPE:-observability/ingest}"
    ports:
      - "8428:8428"
      - "3100:3100"
      - "4317:4317"
      - "4318:4318"
      - "9901:9901"
    depends_on:
      - victoriametrics
      - loki
      - alloy
    volumes:
      - ./config/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    networks:
      - observability

  loki:
    image: grafana/loki:3.7.3
    container_name: ahara-loki
    init: true
    user: *observability-user
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    command:
      - -config.file=/etc/loki/loki.yaml
    # Not published to the host — external pushers go through ingest-gateway
    # (JWT auth). Internal clients reach it as loki:3100.
    volumes:
      - ./config/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - /mnt/apps/apps/ahara-observability/loki:/loki
    networks:
      - observability

  tempo:
    image: grafana/tempo:2.9.0
    container_name: ahara-tempo
    init: true
    user: *observability-user
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    command:
      - -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./config/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - /mnt/apps/apps/ahara-observability/tempo:/var/tempo
    networks:
      - observability

  influxdb:
    image: influxdb:2.9.1
    container_name: ahara-influxdb
    init: true
    user: *observability-user
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    ports:
      - "18086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: "${INFLUXDB_ADMIN_TOKEN}"
      DOCKER_INFLUXDB_INIT_BUCKET: "env_sensors"
      DOCKER_INFLUXDB_INIT_MODE: "setup"
      DOCKER_INFLUXDB_INIT_ORG: "ahara"
      DOCKER_INFLUXDB_INIT_PASSWORD: "${INFLUXDB_ADMIN_PASSWORD}"
      DOCKER_INFLUXDB_INIT_RETENTION: "0"
      DOCKER_INFLUXDB_INIT_USERNAME: "admin"
    volumes:
      - /mnt/apps/apps/ahara-observability/influxdb:/var/lib/influxdb2
      - /mnt/apps/apps/ahara-observability/influxdb-config:/etc/influxdb2
    networks:
      - observability

  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: ahara-node-exporter
    init: true
    user: *observability-user
    restart: unless-stopped
    stop_grace_period: 30s
    pid: host
    security_opt:
      - no-new-privileges:true
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|var/lib/docker/.+)($|/)
    volumes:
      - /:/host:ro,rslave
    networks:
      - observability

networks:
  observability:
    name: ahara-observability
